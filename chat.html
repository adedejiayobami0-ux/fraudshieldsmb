<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FraudShield SMB — Fraud Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}

body.dark{background:#08080C;color:#F0EDE8}
body.light{background:#F4F6FA;color:#1A1A2E}

body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(0,210,180,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,210,180,.03) 1px,transparent 1px);background-size:48px 48px}
body.light::before{background-image:linear-gradient(rgba(0,137,123,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,137,123,.04) 1px,transparent 1px)}

.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
body.dark .orb1{width:600px;height:600px;background:radial-gradient(circle,rgba(0,210,180,.08) 0%,transparent 70%);top:-200px;left:-200px}
body.dark .orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(100,60,255,.06) 0%,transparent 70%);bottom:-100px;right:-100px}
body.light .orb1{width:600px;height:600px;background:radial-gradient(circle,rgba(0,137,123,.06) 0%,transparent 70%);top:-200px;left:-200px}
body.light .orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(100,60,255,.04) 0%,transparent 70%);bottom:-100px;right:-100px}

/* NAV */
nav{position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);border-bottom:1px solid}
body.dark nav{background:rgba(8,8,12,.88);border-color:rgba(255,255,255,.06)}
body.light nav{background:rgba(244,246,250,.92);border-color:#E8ECF2}
.nav-inner{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;max-width:1200px;margin:0 auto}
.nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.logo-box{width:32px;height:32px;background:linear-gradient(135deg,#00D2B4,#00A896);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 0 16px rgba(0,210,180,.3)}
.logo-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.04em}
body.dark .logo-name{color:#00D2B4}
body.light .logo-name{color:#00897B}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-link{padding:7px 14px;border-radius:7px;font-size:13px;cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;text-decoration:none}
body.dark .nav-link{color:rgba(240,237,232,.55)}
body.light .nav-link{color:rgba(26,26,46,.55)}
.live-dot-nav{width:7px;height:7px;border-radius:50%;background:#10B981;animation:blink 2s infinite;display:inline-block;margin-right:5px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.theme-pill{display:flex;align-items:center;gap:7px;padding:6px 12px;border-radius:20px;border:1px solid;cursor:pointer;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;background:none}
body.dark .theme-pill{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.1);color:rgba(240,237,232,.5)}
body.light .theme-pill{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.1);color:rgba(26,26,46,.5)}
.t-track{width:26px;height:15px;border-radius:8px;position:relative;flex-shrink:0;transition:background .25s}
body.dark .t-track{background:rgba(255,255,255,.15)}
body.light .t-track{background:#00897B}
.t-knob{position:absolute;top:2px;left:2px;width:11px;height:11px;border-radius:50%;background:#fff;transition:transform .25s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
body.light .t-knob{transform:translateX(11px)}

/* LAYOUT */
.wrap{position:relative;z-index:1;height:calc(100vh - 61px);display:flex;gap:0}

/* SIDEBAR */
.sidebar{width:300px;flex-shrink:0;border-right:1px solid;display:flex;flex-direction:column;overflow:hidden}
body.dark .sidebar{border-color:rgba(255,255,255,.06);background:rgba(255,255,255,.01)}
body.light .sidebar{border-color:#E8ECF2;background:#fff}

.sidebar-header{padding:16px 20px;border-bottom:1px solid;flex-shrink:0}
body.dark .sidebar-header{border-color:rgba(255,255,255,.06)}
body.light .sidebar-header{border-color:#E8ECF2}
.sidebar-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
body.dark .sidebar-title{color:rgba(240,237,232,.35)}
body.light .sidebar-title{color:rgba(26,26,46,.35)}

.tx-list{flex:1;overflow-y:auto;padding:12px}
.tx-list::-webkit-scrollbar{width:4px}
body.dark .tx-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.tx-item{padding:12px;border-radius:10px;border:1px solid;margin-bottom:8px;cursor:pointer;transition:all .15s}
body.dark .tx-item{border-color:rgba(255,255,255,.06);background:rgba(255,255,255,.02)}
body.light .tx-item{border-color:#E8ECF2;background:#F8FAFC}
.tx-item:hover{border-color:rgba(0,210,180,.3)}
.tx-item.selected{border-color:rgba(0,210,180,.5);background:rgba(0,210,180,.07)}
.tx-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.tx-amount{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
body.dark .tx-amount{color:#F0EDE8}
body.light .tx-amount{color:#1A1A2E}
.tx-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:.06em;text-transform:uppercase}
.tx-badge.blocked{background:rgba(239,68,68,.15);color:#EF4444;border:1px solid rgba(239,68,68,.3)}
.tx-badge.flagged{background:rgba(245,158,11,.12);color:#F59E0B;border:1px solid rgba(245,158,11,.3)}
.tx-badge.safe{background:rgba(0,210,180,.1);color:#00D2B4;border:1px solid rgba(0,210,180,.25)}
.tx-desc{font-family:'DM Sans',sans-serif;font-size:11px;margin-bottom:3px}
body.dark .tx-desc{color:rgba(240,237,232,.45)}
body.light .tx-desc{color:rgba(26,26,46,.5)}
.tx-meta{display:flex;align-items:center;gap:6px}
.tx-processor{font-family:'DM Sans',sans-serif;font-size:10px;padding:1px 6px;border-radius:4px}
body.dark .tx-processor{background:rgba(255,255,255,.06);color:rgba(240,237,232,.3)}
body.light .tx-processor{background:rgba(0,0,0,.05);color:rgba(26,26,46,.4)}
.tx-time{font-family:'DM Sans',sans-serif;font-size:10px}
body.dark .tx-time{color:rgba(240,237,232,.25)}
body.light .tx-time{color:rgba(26,26,46,.3)}

/* CHAT AREA */
.chat-area{flex:1;display:flex;flex-direction:column;min-width:0}

.chat-header{padding:16px 24px;border-bottom:1px solid;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
body.dark .chat-header{border-color:rgba(255,255,255,.06)}
body.light .chat-header{border-color:#E8ECF2}
.chat-header-left{display:flex;align-items:center;gap:10px}
.ai-avatar{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#00D2B4,#00A896);display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 0 12px rgba(0,210,180,.3)}
.chat-header-info h3{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
body.dark .chat-header-info h3{color:#F0EDE8}
body.light .chat-header-info h3{color:#1A1A2E}
.chat-header-info p{font-family:'DM Sans',sans-serif;font-size:11px}
body.dark .chat-header-info p{color:rgba(240,237,232,.4)}
body.light .chat-header-info p{color:rgba(26,26,46,.4)}
.processor-pills{display:flex;gap:6px;align-items:center}
.processor-pill{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;letter-spacing:.03em}
body.dark .processor-pill{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:rgba(240,237,232,.4)}
body.light .processor-pill{background:rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.08);color:rgba(26,26,46,.45)}

/* Messages */
.messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
.messages::-webkit-scrollbar{width:4px}
body.dark .messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}

.msg{display:flex;gap:10px;max-width:80%;animation:msgIn .25s ease both}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.ai{align-self:flex-start}

.msg-avatar{width:28px;height:28px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;margin-top:2px}
.msg.ai .msg-avatar{background:linear-gradient(135deg,#00D2B4,#00A896)}
body.dark .msg.user .msg-avatar{background:rgba(255,255,255,.08)}
body.light .msg.user .msg-avatar{background:rgba(0,0,0,.06)}

.msg-bubble{padding:12px 16px;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:13.5px;line-height:1.6}
body.dark .msg.ai .msg-bubble{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);color:#F0EDE8}
body.light .msg.ai .msg-bubble{background:#fff;border:1px solid #E8ECF2;color:#1A1A2E}
body.dark .msg.user .msg-bubble{background:linear-gradient(135deg,rgba(0,210,180,.15),rgba(0,168,150,.1));border:1px solid rgba(0,210,180,.2);color:#F0EDE8}
body.light .msg.user .msg-bubble{background:linear-gradient(135deg,rgba(0,210,180,.1),rgba(0,168,150,.07));border:1px solid rgba(0,210,180,.2);color:#1A1A2E}

.risk-high{display:inline-flex;align-items:center;gap:5px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#EF4444;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.04em}
.risk-med{display:inline-flex;align-items:center;gap:5px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:#F59E0B;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.04em}
.risk-low{display:inline-flex;align-items:center;gap:5px;background:rgba(0,210,180,.1);border:1px solid rgba(0,210,180,.25);color:#00D2B4;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.04em}

.typing{display:flex;gap:4px;padding:14px 16px;align-items:center}
.typing span{width:6px;height:6px;border-radius:50%;animation:bounce .9s infinite}
body.dark .typing span{background:rgba(240,237,232,.3)}
body.light .typing span{background:rgba(26,26,46,.25)}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

.suggestions{padding:0 24px 12px;display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0}
.suggestion{padding:7px 13px;border-radius:20px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;border:1px solid;transition:all .15s;white-space:nowrap}
body.dark .suggestion{border-color:rgba(0,210,180,.2);color:rgba(240,237,232,.6);background:rgba(0,210,180,.05)}
body.light .suggestion{border-color:rgba(0,137,123,.2);color:rgba(26,26,46,.6);background:rgba(0,137,123,.04)}
.suggestion:hover{border-color:rgba(0,210,180,.5)}

.chat-input-area{padding:16px 24px;border-top:1px solid;flex-shrink:0}
body.dark .chat-input-area{border-color:rgba(255,255,255,.06)}
body.light .chat-input-area{border-color:#E8ECF2}
.input-row{display:flex;gap:10px;align-items:flex-end}
.chat-input{flex:1;padding:12px 16px;border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;border:1px solid;resize:none;outline:none;transition:border-color .2s;min-height:44px;max-height:120px}
body.dark .chat-input{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.1);color:#F0EDE8}
body.dark .chat-input::placeholder{color:rgba(240,237,232,.3)}
body.dark .chat-input:focus{border-color:rgba(0,210,180,.4)}
body.light .chat-input{background:#fff;border-color:#E8ECF2;color:#1A1A2E}
body.light .chat-input::placeholder{color:rgba(26,26,46,.3)}
body.light .chat-input:focus{border-color:rgba(0,137,123,.4)}
.send-btn{width:44px;height:44px;border-radius:10px;border:none;background:linear-gradient(135deg,#00D2B4,#00A896);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px rgba(0,210,180,.3);transition:all .2s;flex-shrink:0}
.send-btn:hover{box-shadow:0 0 28px rgba(0,210,180,.5);transform:translateY(-1px)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

@media(max-width:700px){.sidebar{display:none}.msg{max-width:95%}}
</style>
</head>
<body class="dark">
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="https://www.fraudshieldsmb.com">
      <div class="logo-box">🛡</div>
      <span class="logo-name">FRAUDSHIELD SMB</span>
    </a>
    <div class="nav-right">
      <span style="font-family:'DM Sans',sans-serif;font-size:12px;color:#00D2B4;font-weight:600">

      </span>

</nav>

<div class="wrap">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Recent Transactions</div>
      <div style="display:flex;gap:8px">
        <div style="flex:1;padding:8px 10px;border-radius:8px;border:1px solid rgba(239,68,68,.2);background:rgba(239,68,68,.06);text-align:center">
          <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#EF4444">3</div>
          <div style="font-family:'DM Sans',sans-serif;font-size:9px;color:rgba(240,237,232,.35);letter-spacing:1px;text-transform:uppercase">Blocked</div>
        </div>
        <div style="flex:1;padding:8px 10px;border-radius:8px;border:1px solid rgba(245,158,11,.2);background:rgba(245,158,11,.06);text-align:center">
          <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#F59E0B">2</div>
          <div style="font-family:'DM Sans',sans-serif;font-size:9px;color:rgba(240,237,232,.35);letter-spacing:1px;text-transform:uppercase">Flagged</div>
        </div>
        <div style="flex:1;padding:8px 10px;border-radius:8px;border:1px solid rgba(0,210,180,.2);background:rgba(0,210,180,.06);text-align:center">
          <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#00D2B4">4</div>
          <div style="font-family:'DM Sans',sans-serif;font-size:9px;color:rgba(240,237,232,.35);letter-spacing:1px;text-transform:uppercase">Safe</div>
        </div>
      </div>
    </div>
    <div class="tx-list" id="tx-list"></div>
  </div>

  <!-- CHAT -->
  <div class="chat-area">
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="ai-avatar">🛡</div>
        <div class="chat-header-info">
          <h3>FraudShield AI</h3>
          <p>Monitoring all your payment channels in real time</p>
        </div>
      </div>
      <div class="processor-pills">
        <span class="processor-pill">Stripe</span>
        <span class="processor-pill">Square</span>
        <span class="processor-pill">PayPal</span>
        <span class="processor-pill">ACH</span>
        <span class="processor-pill">Zelle</span>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="suggestions" id="suggestions">
      <button class="suggestion" onclick="sendSuggestion(this)">Is my last transaction safe?</button>
      <button class="suggestion" onclick="sendSuggestion(this)">Show me all blocked charges</button>
      <button class="suggestion" onclick="sendSuggestion(this)">Any card testing attacks?</button>
      <button class="suggestion" onclick="sendSuggestion(this)">What should I watch out for?</button>
    </div>

    <div class="chat-input-area">
      <div class="input-row">
        <textarea class="chat-input" id="chat-input" placeholder="Ask about any transaction, fraud pattern, or risk..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="#08080C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
const transactions = [
  {
    id: 'tx_001', amount: '$340.00', desc: 'Online purchase · Visa ending 9235',
    status: 'blocked', time: '2 min ago', processor: 'Stripe',
    detail: { risk_score: 94, reason: 'Card testing detected — 31 rapid attempts in under 2 minutes from a Tor exit node IP (185.220.101.47). Billing ZIP does not match shipping ZIP. Blocked automatically.' }
  },
  {
    id: 'tx_002', amount: '$3,200.00', desc: 'ACH transfer · routing 021000021',
    status: 'flagged', time: '8 min ago', processor: 'ACH',
    detail: { risk_score: 71, reason: 'Bank account opened less than 30 days ago. Transfer amount exceeds this account\'s 30-day average by 840%. Flagged for manual review before processing.' }
  },
  {
    id: 'tx_003', amount: '$89.00', desc: 'Subscription renewal · Visa ending 4242',
    status: 'safe', time: '14 min ago', processor: 'Stripe',
    detail: { risk_score: 8, reason: 'Low risk. Single attempt, ZIP codes match, known device fingerprint, IP geocodes to billing city (San Francisco, CA). Returning customer for 6 months.' }
  },
  {
    id: 'tx_004', amount: '$1,450.00', desc: 'Purchase · Visa ending 0259',
    status: 'blocked', time: '22 min ago', processor: 'Square',
    detail: { risk_score: 88, reason: 'High chargeback-risk card. 7 attempts in 4 minutes, shipping address in a different state than billing. Dispute probability flagged at 92% by our model.' }
  },
  {
    id: 'tx_005', amount: '$220.00', desc: 'In-store purchase · Mastercard ending 4444',
    status: 'safe', time: '31 min ago', processor: 'Square',
    detail: { risk_score: 12, reason: 'Low risk. Chip-and-PIN transaction, matching ZIP, single attempt, IP consistent with Austin, TX billing address.' }
  },
  {
    id: 'tx_006', amount: '$5,800.00', desc: 'Wire transfer · identity mismatch',
    status: 'flagged', time: '45 min ago', processor: 'Zelle',
    detail: { risk_score: 76, reason: 'Identity mismatch — name on Zelle account does not match submitted ID document. Sender IP originates from Eastern Europe despite a US billing address. Flagged pending identity verification.' }
  },
  {
    id: 'tx_007', amount: '$45.00', desc: 'Recurring charge · Visa ending 1111',
    status: 'safe', time: '1 hr ago', processor: 'PayPal',
    detail: { risk_score: 5, reason: 'Very low risk. Recurring PayPal charge from a verified customer, consistent device and IP history over 8 months. No anomalies detected.' }
  },
  {
    id: 'tx_008', amount: '$299.00', desc: 'Checkout · card testing bot detected',
    status: 'blocked', time: '2 hr ago', processor: 'PayPal',
    detail: { risk_score: 99, reason: 'Automated card testing bot — 44 attempts in 90 seconds from a known bot IP (185.220.101.12). All attempts used sequentially generated card numbers. Blocked immediately.' }
  },
  {
    id: 'tx_009', amount: '$120.00', desc: 'Purchase · Visa Debit ending 5556',
    status: 'safe', time: '3 hr ago', processor: 'Stripe',
    detail: { risk_score: 14, reason: 'Low risk. Visa Debit, matching ZIP, single attempt, Seattle WA IP matches billing address. First-time customer but all signals clean.' }
  }
];

let selectedTx = null;
let isLoading = false;
let conversationHistory = [];

function renderSidebar() {
  const list = document.getElementById('tx-list');
  list.innerHTML = transactions.map(tx => `
    <div class="tx-item" id="tx-${tx.id}" onclick="selectTx('${tx.id}')">
      <div class="tx-top">
        <span class="tx-amount">${tx.amount}</span>
        <span class="tx-badge ${tx.status}">${tx.status}</span>
      </div>
      <div class="tx-desc">${tx.desc}</div>
      <div class="tx-meta">
        <span class="tx-processor">${tx.processor}</span>
        <span class="tx-time">${tx.time}</span>
      </div>
    </div>
  `).join('');
}

function selectTx(id) {
  selectedTx = transactions.find(t => t.id === id);
  document.querySelectorAll('.tx-item').forEach(el => el.classList.remove('selected'));
  document.getElementById('tx-' + id).classList.add('selected');
  document.getElementById('suggestions').style.display = 'none';

  const emoji = {blocked:'🚫',flagged:'⚠️',safe:'✅'}[selectedTx.status];
  const badge = selectedTx.detail.risk_score >= 80
    ? `<span class="risk-high">🔴 HIGH RISK · ${selectedTx.detail.risk_score}/100</span>`
    : selectedTx.detail.risk_score >= 50
    ? `<span class="risk-med">🟡 MEDIUM RISK · ${selectedTx.detail.risk_score}/100</span>`
    : `<span class="risk-low">🟢 LOW RISK · ${selectedTx.detail.risk_score}/100</span>`;

  addMessage('ai', `${emoji} <strong>${selectedTx.amount}</strong> via ${selectedTx.processor} — ${selectedTx.desc}<br/><br/>${badge}<br/><br/>${selectedTx.detail.reason}<br/><br/>Ask me anything about this transaction.`);
}

function addMessage(role, content) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-avatar">${role === 'ai' ? '🛡' : '👤'}</div>
    <div class="msg-bubble">${content}</div>
  `;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai'; div.id = 'typing-indicator';
  div.innerHTML = `<div class="msg-avatar">🛡</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function callAI(userMessage) {
  const txContext = selectedTx
    ? `\n\nCurrently selected transaction:\n- Amount: ${selectedTx.amount}\n- Processor: ${selectedTx.processor}\n- Description: ${selectedTx.desc}\n- Status: ${selectedTx.status}\n- Risk Score: ${selectedTx.detail.risk_score}/100\n- Analysis: ${selectedTx.detail.reason}`
    : '';

  const allTx = `\n\nAll transactions:\n` + transactions.map(tx =>
    `- ${tx.amount} | ${tx.processor} | ${tx.status.toUpperCase()} | Risk: ${tx.detail.risk_score}/100 | ${tx.desc} | ${tx.time}`
  ).join('\n');

  const systemPrompt = `You are FraudShield AI, an expert fraud detection assistant for American small businesses. You monitor payments across Stripe, Square, PayPal, ACH, Zelle, and any other payment method a business uses.

You analyze transactions and explain fraud risks in plain English — these are small business owners, not engineers. Be direct, specific, and helpful.

Risk levels: HIGH (80-100) = block immediately, MEDIUM (50-79) = review manually, LOW (0-49) = safe to process.

Key fraud patterns: card testing (bots rapidly trying stolen cards), ACH fraud (fake bank details), chargeback fraud, identity mismatch, friendly fraud.

Keep responses concise and conversational. No markdown headers or bullet points — natural paragraphs only.${txContext}${allTx}`;

  conversationHistory.push({ role: 'user', content: userMessage });

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      system: systemPrompt,
      messages: conversationHistory
    })
  });

  const data = await response.json();
  const reply = data.content?.[0]?.text || 'Sorry, I could not analyze that right now.';
  conversationHistory.push({ role: 'assistant', content: reply });
  return reply;
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg || isLoading) return;
  document.getElementById('suggestions').style.display = 'none';
  input.value = ''; input.style.height = 'auto';
  isLoading = true; document.getElementById('send-btn').disabled = true;
  addMessage('user', msg);
  showTyping();
  try {
    const reply = await callAI(msg);
    removeTyping();
    addMessage('ai', reply.replace(/\n/g, '<br/>'));
  } catch(e) {
    removeTyping();
    addMessage('ai', 'Connection error. Please try again.');
  }
  isLoading = false; document.getElementById('send-btn').disabled = false;
  document.getElementById('chat-input').focus();
}

function sendSuggestion(btn) {
  document.getElementById('chat-input').value = btn.textContent;
  sendMessage();
}

function handleKey(e) { if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }

let isDark = localStorage.getItem('fs_theme') ? localStorage.getItem('fs_theme')==='dark' : window.matchMedia('(prefers-color-scheme:dark)').matches;
applyTheme();
function applyTheme(){ document.body.className=isDark?'dark':'light'; const l=document.getElementById('theme-lbl'); if(l) l.textContent=isDark?'☀ Light':'☾ Dark'; }
function toggleTheme(){ isDark=!isDark; localStorage.setItem('fs_theme',isDark?'dark':'light'); applyTheme(); }

renderSidebar();
addMessage('ai', '👋 Hey! I\'m your FraudShield AI analyst. I\'m monitoring <strong>9 transactions</strong> across Stripe, Square, PayPal, ACH, and Zelle right now — 3 blocked, 2 flagged, 4 safe.<br/><br/>Click any transaction on the left to analyze it, or just ask me anything.');
</script>
