const VENDORS  = ["Stripe","Square","PayPal Business","ACH Transfer","Wire Transfer","Zelle","Venmo Business","Check Deposit","Chase Business","Bank of America","QuickBooks Payments","Clover"];

const FRAUD_SIGNALS = ["Card testing","Velocity anomaly","Geo-location mismatch","Unusual vendor","Amount threshold","Time-of-day anomaly","Device fingerprint","Check fraud","ACH return","Identity mismatch","Chargeback pattern","New account fraud"];

// ── SCORING ENGINE — US SMB FRAUD PATTERNS ────────────────────────────────────
function scoreTransaction({ amount, vendor, category, hour }) {
  let score = 0; const signals = [];

  // Amount threshold
  if (amount > 5000)      { score += 26; signals.push("Amount threshold"); }
  else if (amount > 2000) { score += 11; }

  // Time-of-day anomaly (outside business hours)
  if (hour >= 23 || hour < 5)  { score += 24; signals.push("Time-of-day anomaly"); }
  else if (hour < 7)            { score += 9; }

  // High-risk channels for US SMBs
  if (["Wire Transfer","Zelle","Venmo Business"].includes(vendor)) { score += 21; signals.push("Unusual vendor"); }
  else if (["ACH Transfer"].includes(vendor))                       { score += 7; }

  // Category risk
  if (category === "Chargeback")      { score += 22; signals.push("Chargeback pattern"); }
  else if (category === "Wire")       { score += 18; signals.push("Velocity anomaly"); }
  else if (category === "Refund")     { score += 13; signals.push("Velocity anomaly"); }
  else if (category === "Equipment")  { score += 7; }

  // Simulate probabilistic signals
  if (Math.random() < 0.10) { score += 20; signals.push("Card testing"); }
  if (Math.random() < 0.08) { score += 16; signals.push("Device fingerprint"); }
  if (Math.random() < 0.07) { score += 18; signals.push("Geo-location mismatch"); }
  if (Math.random() < 0.05) { score += 14; signals.push("Check fraud"); }

  score += Math.floor(Math.random() * 10);
  score = Math.min(99, Math.max(1, score));
  const status = score >= 85 ? "blocked" : score >= 70 ? "flagged" : score >= 50 ? "review" : "clear";
  return { score, signals: [...new Set(signals)], status };
}

function genTxn(clientName) {
  const amount = Math.floor(Math.random() * 9000) + 50;
  const ts     = new Date(Date.now() - Math.random() * 7 * 24 * 60 * 60 * 1000);
  const vendor = VENDORS[Math.floor(Math.random() * VENDORS.length)];
  const cat    = CATS[Math.floor(Math.random() * CATS.length)];
  const { score, signals, status } = scoreTransaction({ amount, vendor, category: cat, hour: ts.getHours() });
  return {
    id: `TXN-${Math.random().toString(36).substr(2,8).toUpperCase()}`,
    timestamp: ts, vendor, category: cat, amount,
    riskScore: score, status, fraudType: signals[0] || null,
    blocked: score >= 85,
  };
}

const ScoreRing = ({ score, size=56 }) => {
  const { C } = useTheme();
  const color = score >= 75 ? C.green : score >= 50 ? C.amber : C.red;

    <div style={{ position:"relative", width:size, height:size }}>

        {preview && (

                </div>
                <div style={{ fontSize:11, color:C.textMuted, alignSelf:"center" }}>
                  {t.timestamp.toLocaleDateString()} {t.timestamp.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}
                </div>
                <div style={{ fontFamily:"'Space Mono'", fontSize:12, fontWeight:700, alignSelf:"center", color:C.text }}>${t.amount.toLocaleString()}</div>
                <div style={{ alignSelf:"center" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                    <div style={{ height:4, width:40, background:C.border, borderRadius:2 }}>
                      <div style={{ height:"100%", width:`${t.riskScore}%`, background:rc, borderRadius:2 }}/>
                    </div>
                    <span style={{ fontFamily:"'Space Mono'", fontSize:11, color:rc }}>{t.riskScore}</span>
                  </div>
                  {t.fraudType && <div style={{ fontSize:10, color:C.textMuted, marginTop:2 }}>{t.fraudType}</div>}
                </div>
                <div style={{ alignSelf:"center" }}>
                  <Badge status={t.status}/>
                  {t.blocked && <div style={{ fontSize:10, color:C.red, marginTop:3, fontFamily:"'Space Mono'" }}>AUTO-BLOCKED</div>}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
};

// ── ONBOARDING ────────────────────────────────────────────────────────────────
const STEPS = [{label:"Business Info",icon:"🏪"},{label:"Payments",icon:"💳"},{label:"Risk Profile",icon:"🎯"},{label:"Configuration",icon:"⚙️"},{label:"Activate",icon:"🚀"}];

const OnboardView = () => {
  const { C } = useTheme();
  const [step, setStep] = useState(0);
  const [deployed, setDeployed] = useState(false);
  const [deploying, setDeploying] = useState(false);
  const [deployLog, setDeployLog] = useState([]);
  const [apiKey] = useState(`fs_live_${Math.random().toString(36).substr(2,24)}`);
  const [form, setForm] = useState({ bizName:"", industry:"", state:"WA", employees:"", annualRev:"", processor:"", avgTxn:"", riskTolerance:"balanced", alertEmail:"", blockThreshold:82 });
  const f = (k,v) => setForm(p=>({...p,[k]:v}));

  const deploySteps = ["Creating your FraudShield account…","Provisioning fraud detection engine…","Configuring ML model for your industry…","Setting up alert delivery…","Connecting to your payment processor…","Generating API credentials…","Running initial baseline scan…","✓ FraudShield is active and protecting your business!"];

  const startDeploy = () => {
    setDeploying(true);
    deploySteps.forEach((msg,i)=>setTimeout(()=>{ setDeployLog(p=>[...p,msg]); if(i===deploySteps.length-1) setTimeout(()=>setDeployed(true),400); },i*600));
  };

  const IS = { width:"100%", background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:6, padding:"9px 12px", color:C.text, fontSize:13 };
  const LS = { fontSize:11, color:C.textMuted, marginBottom:5, display:"block", fontWeight:500 };

  return (
    <div style={{ padding:28, maxWidth:680 }} className="slide-in">
      <div style={{ marginBottom:26 }}>
        <h1 style={{ fontSize:22, fontWeight:600, letterSpacing:"-0.02em", marginBottom:4, color:C.text }}>Add a New Business</h1>
        <p style={{ color:C.textMuted, fontSize:13 }}>Set up AI fraud detection for a small business in under 5 minutes</p>
      </div>

      <div style={{ display:"flex", marginBottom:28, background:C.surface, borderRadius:10, border:`1px solid ${C.border}`, overflow:"hidden" }}>
        {STEPS.map((s,i)=>(
          <div key={i} onClick={()=>i<=step&&setStep(i)} style={{ flex:1, padding:"12px 8px", textAlign:"center", cursor:i<=step?"pointer":"default", background:i===step?C.tealGlow:"transparent", borderRight:i<STEPS.length-1?`1px solid ${C.border}`:"none" }}>
            <div style={{ fontSize:16, marginBottom:4 }}>{s.icon}</div>
            <div style={{ fontSize:11, color:i===step?C.teal:i<step?C.textMuted:C.textDim, fontWeight:i===step?600:400 }}>{s.label}</div>
            {i<step && <div style={{ fontSize:10, color:C.green, marginTop:2 }}>✓</div>}
          </div>
        ))}
      </div>

      <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:"22px 26px" }}>
        {step===0 && (
          <div className="slide-in">
            <div style={{ fontWeight:600, fontSize:15, marginBottom:18, color:C.text }}>Business Information</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
              <div><label style={LS}>Business Name *</label><input style={IS} value={form.bizName} onChange={e=>f("bizName",e.target.value)} placeholder="e.g. Pinewood Bakery"/></div>
              <div><label style={LS}>Industry *</label>
                <select style={IS} value={form.industry} onChange={e=>f("industry",e.target.value)}>
                  <option value="">Select…</option>
                  {["Food & Beverage","Retail","Healthcare","Legal Services","Automotive","Construction","Real Estate","Professional Services","E-commerce","Other"].map(i=><option key={i} value={i}>{i}</option>)}
                </select>
              </div>
              <div><label style={LS}>State</label>
                <select style={IS} value={form.state} onChange={e=>f("state",e.target.value)}>
                  {STATES.map(s=><option key={s} value={s}>{s}</option>)}
                </select>
              </div>
              <div><label style={LS}>Number of Employees</label>
                <select style={IS} value={form.employees} onChange={e=>f("employees",e.target.value)}>
                  <option value="">Select…</option>
                  {["1–5","6–15","16–50","51–100","100+"].map(r=><option key={r} value={r}>{r}</option>)}
                </select>
              </div>
              <div style={{ gridColumn:"span 2" }}><label style={LS}>Alert Email *</label><input style={IS} type="email" value={form.alertEmail} onChange={e=>f("alertEmail",e.target.value)} placeholder="owner@yourbusiness.com"/></div>
            </div>
          </div>
        )}
        {step===1 && (
          <div className="slide-in">
            <div style={{ fontWeight:600, fontSize:15, marginBottom:18, color:C.text }}>Payment Profile</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
              <div><label style={LS}>Annual Revenue</label>
                <select style={IS} value={form.annualRev} onChange={e=>f("annualRev",e.target.value)}>
                  <option value="">Select…</option>
                  {["Under $100K","$100K–$500K","$500K–$2M","$2M–$10M","$10M+"].map(r=><option key={r} value={r}>{r}</option>)}
                </select>
              </div>
              <div><label style={LS}>Primary Payment Processor</label>
                <select style={IS} value={form.processor} onChange={e=>f("processor",e.target.value)}>
                  <option value="">Select…</option>
                  {["Stripe","Square","PayPal","Clover","Toast","QuickBooks","Other"].map(p=><option key={p} value={p}>{p}</option>)}
                </select>
              </div>
              <div><label style={LS}>Average Transaction Size</label>
                <select style={IS} value={form.avgTxn} onChange={e=>f("avgTxn",e.target.value)}>
                  <option value="">Select…</option>
                  {["Under $50","$50–$500","$500–$5K","$5K–$50K","$50K+"].map(r=><option key={r} value={r}>{r}</option>)}
                </select>
              </div>
            </div>
          </div>
        )}
        {step===2 && (
          <div className="slide-in">
            <div style={{ fontWeight:600, fontSize:15, marginBottom:18, color:C.text }}>Risk Tolerance</div>
            {[{v:"conservative",label:"Conservative",desc:"Catch everything. Higher review queue. Best for businesses with past fraud incidents.",color:C.red},{v:"balanced",label:"Balanced",desc:"Optimized precision and recall. Recommended for most small businesses.",color:C.amber},{v:"permissive",label:"Permissive",desc:"Minimal false positives. Best for low-risk industries with strong customer relationships.",color:C.green}].map(opt=>(
              <div key={opt.v} onClick={()=>f("riskTolerance",opt.v)} style={{ border:`1px solid ${form.riskTolerance===opt.v?opt.color+"88":C.border}`, borderRadius:8, padding:"14px 16px", marginBottom:10, cursor:"pointer", background:form.riskTolerance===opt.v?`${opt.color}10`:"transparent" }}>
                <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:4 }}>
                  <div style={{ width:10, height:10, borderRadius:"50%", background:form.riskTolerance===opt.v?opt.color:C.border }}/>
                  <span style={{ fontWeight:600, fontSize:13, color:form.riskTolerance===opt.v?opt.color:C.text }}>{opt.label}</span>
                </div>
                <div style={{ fontSize:12, color:C.textMuted, marginLeft:20 }}>{opt.desc}</div>
              </div>
            ))}
          </div>
        )}
        {step===3 && (
          <div className="slide-in">
            <div style={{ fontWeight:600, fontSize:15, marginBottom:18, color:C.text }}>Detection Settings</div>
            <div style={{ marginBottom:18 }}>
              <label style={LS}>Auto-Block Threshold: <span style={{ color:C.teal, fontFamily:"'Space Mono'" }}>{form.blockThreshold}</span></label>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                <span style={{ fontSize:11, color:C.textMuted }}>60</span>
                <input type="range" min={60} max={99} value={form.blockThreshold} onChange={e=>f("blockThreshold",+e.target.value)} style={{ flex:1, accentColor:C.teal }}/>
                <span style={{ fontSize:11, color:C.textMuted }}>99</span>
              </div>
              <div style={{ fontSize:11, color:C.textMuted, marginTop:6 }}>Transactions scoring above this are auto-blocked pending manual review.</div>
            </div>
            <div style={{ background:C.surfaceAlt, borderRadius:8, padding:"14px 16px", border:`1px solid ${C.border}` }}>
              <div style={{ fontWeight:600, fontSize:13, marginBottom:10, color:C.text }}>Summary</div>
              {[["Business",form.bizName||"—"],["Industry",form.industry||"—"],["State",form.state],["Processor",form.processor||"—"],["Risk Profile",form.riskTolerance],["Block Threshold",`Score ≥ ${form.blockThreshold}`],["Alert Email",form.alertEmail||"—"]].map(([k,v])=>(
                <div key={k} style={{ display:"flex", justifyContent:"space-between", marginBottom:6, fontSize:12 }}>
                  <span style={{ color:C.textMuted }}>{k}</span>
                  <span style={{ fontFamily:"'Space Mono'", color:C.text }}>{v}</span>
                </div>
              ))}
            </div>
          </div>
        )}
        {step===4 && (
          <div className="slide-in">
            <div style={{ fontWeight:600, fontSize:15, marginBottom:18, color:C.text }}>Activate FraudShield</div>
            {!deploying && !deployed && (
              <div style={{ textAlign:"center", padding:"20px 0" }}>
                <div style={{ fontSize:48, marginBottom:14 }}>🚀</div>
                <div style={{ fontWeight:600, fontSize:15, marginBottom:8, color:C.text }}>Ready to activate</div>
                <div style={{ color:C.textMuted, fontSize:13, marginBottom:24 }}>Start protecting <strong style={{ color:C.text }}>{form.bizName||"your business"}</strong> against fraud immediately.</div>
                <button onClick={startDeploy} style={{ padding:"12px 32px", borderRadius:10, fontSize:14, fontWeight:700, background:C.teal, color:"#fff" }}>Activate FraudShield →</button>
              </div>
            )}
            {deploying && !deployed && (
              <div style={{ fontFamily:"'Space Mono'", fontSize:12, background:C.surfaceAlt, borderRadius:8, padding:"16px 18px" }}>
                {deployLog.map((msg,i)=><div key={i} style={{ color:msg.startsWith("✓")?C.green:C.teal, marginBottom:8 }}>{msg}</div>)}
                {deployLog.length<deploySteps.length && <div style={{ color:C.textDim }}>…</div>}
              </div>
            )}
            {deployed && (
              <div className="slide-in">
                <div style={{ textAlign:"center", padding:"14px 0 20px" }}>
                  <div style={{ fontSize:48, marginBottom:12 }}>✅</div>
                  <div style={{ fontFamily:"'Space Mono'", fontSize:14, color:C.green, fontWeight:700, marginBottom:8 }}>FRAUDSHIELD IS ACTIVE</div>
                  <div style={{ color:C.textMuted, fontSize:13 }}>{form.bizName||"Your business"} is now protected.</div>
                </div>
                <div style={{ background:C.surfaceAlt, borderRadius:8, padding:"16px 18px", border:`1px solid ${C.border}` }}>
                  <div style={{ fontFamily:"'Space Mono'", fontSize:9, color:C.teal, marginBottom:10 }}>YOUR API CREDENTIALS</div>
                  {[["Endpoint","https://api.fraudshield.io/v1/score"],["API Key",apiKey],["Block Threshold",`≥ ${form.blockThreshold}`],["Status","🟢 ACTIVE"]].map(([k,v])=>(
                    <div key={k} style={{ display:"flex", justifyContent:"space-between", marginBottom:7, fontSize:12 }}>
                      <span style={{ color:C.textMuted }}>{k}</span>
                      <span style={{ fontFamily:"'Space Mono'", color:k==="API Key"?C.amber:C.teal, fontSize:11, wordBreak:"break-all", textAlign:"right", maxWidth:280 }}>{v}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}
        {!deployed && (
          <div style={{ display:"flex", justifyContent:"space-between", marginTop:22, paddingTop:18, borderTop:`1px solid ${C.border}` }}>
            <button onClick={()=>setStep(s=>Math.max(0,s-1))} disabled={step===0} style={{ padding:"9px 20px", borderRadius:8, fontSize:13, background:step===0?"transparent":C.surfaceAlt, color:step===0?C.textDim:C.text, border:`1px solid ${step===0?C.textDim+"33":C.border}`, cursor:step===0?"not-allowed":"pointer" }}>← Back</button>
            {step<4 && <button onClick={()=>setStep(s=>Math.min(4,s+1))} style={{ padding:"9px 24px", borderRadius:8, fontSize:13, fontWeight:600, background:C.teal, color:"#fff" }}>{step===3?"Review & Activate →":"Next →"}</button>}
          </div>
        )}
      </div>
    </div>
  );
};

// ── NAV ───────────────────────────────────────────────────────────────────────
const NAV_ITEMS = [
  {id:"landing", label:"Product",        icon:"◈"},
  {id:"pm",      label:"PM Overview",    icon:"◉"},
  {id:"client",  label:"Client View",    icon:"◎"},
  {id:"onboard", label:"Add Business",   icon:"⊕"},
];

const Nav = ({ active, setActive, clientName, onScore }) => {
  const { C } = useTheme();
  return (
    <div style={{ width:220, background:C.surface, borderRight:`1px solid ${C.border}`, display:"flex", flexDirection:"column", flexShrink:0, height:"100vh", position:"sticky", top:0 }}>
      <div style={{ padding:"20px 20px 16px", borderBottom:`1px solid ${C.border}` }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ width:34, height:34, background:C.teal, borderRadius:9, display:"flex", alignItems:"center", justifyContent:"center", fontSize:17 }}>🛡</div>
          <div>
            <div style={{ fontFamily:"'Space Mono'", fontWeight:700, fontSize:13, color:C.teal }}>FRAUDSHIELD</div>
            <div style={{ fontSize:10, color:C.textMuted, letterSpacing:"0.05em" }}>SMB PROTECT</div>
          </div>
        </div>
      </div>
      <div style={{ padding:"9px 20px", borderBottom:`1px solid ${C.border}`, display:"flex", alignItems:"center", gap:8 }}>
        <div style={{ width:6, height:6, borderRadius:"50%", background:C.green }} className="pulse-live"/>
        <span style={{ fontSize:11, color:C.textMuted, fontFamily:"'Space Mono'" }}>LIVE MONITORING</span>
      </div>
      <nav style={{ padding:"12px 10px", flex:1 }}>
        {NAV_ITEMS.map(item=>(
          <button key={item.id} onClick={()=>setActive(item.id)} style={{ width:"100%", textAlign:"left", padding:"10px 12px", borderRadius:6, display:"flex", alignItems:"center", gap:10, marginBottom:2, background:active===item.id?C.tealGlow:"transparent", color:active===item.id?C.teal:C.textMuted, border:active===item.id?`1px solid ${C.teal}33`:"1px solid transparent", fontSize:13, fontWeight:active===item.id?600:400 }}>
            <span style={{ fontFamily:"'Space Mono'", fontSize:14 }}>{item.icon}</span>
            {item.label}
            {item.id==="client"&&active==="client"&&clientName&&<span style={{ marginLeft:"auto", fontSize:10, color:C.tealDim, maxWidth:72, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{clientName}</span>}
          </button>
        ))}
        <div style={{ borderTop:`1px solid ${C.border}`, margin:"12px 0 8px" }}/>
        <button onClick={onScore} style={{ width:"100%", textAlign:"left", padding:"10px 12px", borderRadius:6, display:"flex", alignItems:"center", gap:10, background:C.amberGlow, color:C.amber, border:`1px solid ${C.amber}33`, fontSize:13, fontWeight:600 }}>
          <span style={{ fontFamily:"'Space Mono'", fontSize:14 }}>⚡</span>Score Transaction
        </button>
      </nav>
      <div style={{ padding:"12px 16px", borderTop:`1px solid ${C.border}` }}>
        <ThemeToggle/>
      </div>
      <div style={{ padding:"8px 20px 16px" }}>
        <div style={{ fontSize:10, color:C.textDim, fontFamily:"'Space Mono'" }}>v1.0.0-beta</div>
        <div style={{ fontSize:10, color:C.textDim, marginTop:2 }}>FraudShield SMB</div>
      </div>
    </div>
  );
};

// ── APP ───────────────────────────────────────────────────────────────────────
const App = () => {
  const [isDark, setIsDark] = useState(()=>{
    const saved = localStorage.getItem("fs_theme");
    if (saved) return saved === "dark";
    return window.matchMedia("(prefers-color-scheme: dark)").matches;
  });

  const C = isDark ? DARK : LIGHT;

  const toggle = useCallback(()=>{
    setIsDark(d=>{
      const next = !d;
      localStorage.setItem("fs_theme", next?"dark":"light");
      document.body.className = next?"dark":"light";
      return next;
    });
  },[]);

  useEffect(()=>{ document.body.className = isDark?"dark":"light"; },[isDark]);

  const [view, setView] = useState("landing");
  const [selectedClient, setSelectedClient] = useState(null);
  const [showScore, setShowScore] = useState(false);

  return (
    <ThemeCtx.Provider value={{ C, isDark, toggle }}>
      <div style={{ display:"flex", height:"100vh", background:C.bg }}>
        {view !== "landing" && (
          <Nav active={view} setActive={setView} clientName={selectedClient?.name} onScore={()=>setShowScore(true)}/>
        )}
        <div style={{ flex:1, overflowY:"auto", overflowX:"hidden", background:C.bg }}>
          {view === "landing" && (
            <div>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"15px 24px", borderBottom:`1px solid ${C.border}`, background:C.surface, position:"sticky", top:0, zIndex:10 }}>
                <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <div style={{ width:30, height:30, background:C.teal, borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center" }}>🛡</div>
                  <div>
                    <div style={{ fontFamily:"'Space Mono'", fontWeight:700, fontSize:13, color:C.teal }}>FRAUDSHIELD SMB</div>
                  </div>
                </div>
                <div style={{ display:"flex", gap:10, alignItems:"center" }}>
                  <ThemeToggle/>
                  <button onClick={()=>setView("onboard")} style={{ padding:"8px 16px", borderRadius:7, fontSize:13, color:C.textMuted, border:`1px solid ${C.border}`, background:"transparent" }}>Add Business</button>
                  <button onClick={()=>setView("pm")} style={{ padding:"8px 18px", borderRadius:7, fontSize:13, fontWeight:600, background:C.teal, color:"#fff" }}>Dashboard →</button>
                </div>
              </div>
              <LandingView onEnterDashboard={()=>setView("pm")}/>
            </div>
          )}
          {view === "pm"      && <PMOverview onSelectClient={c=>{ setSelectedClient(c); setView("client"); }}/>}
          {view === "client"  && <ClientView client={selectedClient}/>}
          {view === "onboard" && <OnboardView/>}
        </div>
        {showScore && <ScoreModal onClose={()=>setShowScore(false)}/>}
      </div>
    </ThemeCtx.Provider>
  );
};

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
