  { id:3, name:"Northgate Dental",     industry:"Healthcare",        location:"Bellevue, WA",  risk:"high",   alerts:14, score:41, onboarded:"Sep 2024", transactions:2103, flagged:22, saved:31200 },
  { id:4, name:"Emerald Threads",      industry:"Retail",            location:"Redmond, WA",   risk:"low",    alerts:1,  score:92, onboarded:"Dec 2024", transactions:3211, flagged:1,  saved:4100  },
  { id:5, name:"Summit Law Group",     industry:"Legal Services",    location:"Kirkland, WA",  risk:"medium", alerts:5,  score:71, onboarded:"Nov 2024", transactions:672,  flagged:6,  saved:19800 },
  { id:6, name:"Harbor Fresh Seafood", industry:"Food & Beverage",   location:"Bremerton, WA", risk:"low",    alerts:0,  score:95, onboarded:"Jan 2025", transactions:1103, flagged:0,  saved:0     },

const ARCH_NODES = [

  { id:"smb_dash", label:"SMB Dashboard",     sub:"React / CloudFront",   x:90, y:58, color:C.green,    icon:"📱" },

  ["engine","rules"],["engine","stream"],["engine","db"],
  ["rules","db"],["stream","alerts"],["db","pm"],["db","smb_dash"],

// ── FRAUD SCORING ENGINE (local ML simulation) ────────────────────────────────
function scoreTransaction({ amount, vendor, category, hour }) {
  let score = 0;
  const signals = [];

  // Amount threshold
  if (amount > 5000)       { score += 28; signals.push("Amount Threshold"); }
  else if (amount > 2500)  { score += 12; }

  // Time-of-day anomaly
  if (hour >= 22 || hour < 5) { score += 25; signals.push("Time-of-Day Anomaly"); }
  else if (hour < 7)          { score += 10; }

  // Vendor risk profile
  const highRiskVendors = ["Wire Transfer", "Zelle", "Venmo Business"];
  const medRiskVendors  = ["ACH Transfer"];
  if (highRiskVendors.includes(vendor)) { score += 22; signals.push("Unusual Vendor"); }
  else if (medRiskVendors.includes(vendor)) { score += 8; }

  // Category risk
  if (category === "Refund")        { score += 15; signals.push("Velocity Anomaly"); }
  else if (category === "Equipment") { score += 8; }

  // Geo-location — random element (simulate device check)
  if (Math.random() < 0.15) { score += 18; signals.push("Geo-location Mismatch"); }
  if (Math.random() < 0.08) { score += 12; signals.push("Device Fingerprint"); }

  // Add noise
  score += Math.floor(Math.random() * 12);
  score = Math.min(99, Math.max(1, score));

  const status = score >= 85 ? "blocked" : score >= 70 ? "flagged" : score >= 50 ? "review" : "clear";
  return { score, signals: [...new Set(signals)], status };
}

function genTxn(clientName) {
  const risk   = Math.random();
  const amount = Math.floor(Math.random() * 8000) + 50;
  const ts     = new Date(Date.now() - Math.random() * 7 * 24 * 60 * 60 * 1000);
  const vendor = VENDORS[Math.floor(Math.random() * VENDORS.length)];
  const cat    = CATS[Math.floor(Math.random() * CATS.length)];
  const { score, signals, status } = scoreTransaction({ amount, vendor, category: cat, hour: ts.getHours() });
  return {
    id: `TXN-${Math.random().toString(36).substr(2,8).toUpperCase()}`,
    timestamp: ts, vendor, category: cat, amount,
    riskScore: score,
    status: risk > 0.78 ? "flagged" : risk > 0.6 ? "review" : "clear",
    fraudType: signals[0] || null,
    blocked: risk > 0.9,
  };
}

// ── SHARED UI ─────────────────────────────────────────────────────────────────

    medium:  { bg:C.amberGlow,  color:C.amber,  label:"MED RISK"  },
    high:    { bg:C.redGlow,    color:C.red,    label:"HIGH RISK" },
    flagged: { bg:C.redGlow,    color:C.red,    label:"FLAGGED"   },
    blocked: { bg:C.redGlow,    color:C.red,    label:"BLOCKED"   },
    review:  { bg:C.amberGlow,  color:C.amber,  label:"REVIEW"    },
    clear:   { bg:C.greenGlow,  color:C.green,  label:"CLEAR"     },

  const s = map[status] || map.clear;

};

const ScoreRing = ({ score, size=56 }) => {
  const color = score >= 75 ? C.green : score >= 50 ? C.amber : C.red;
  const r = size/2 - 5;
  const circ = 2*Math.PI*r;
  const dash = (score/100)*circ;
  return (
    <div style={{ position:"relative", width:size, height:size }}>
      <svg width={size} height={size} style={{ transform:"rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.border} strokeWidth={4} />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={4}
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
          style={{ transition:"stroke-dasharray 1s ease" }} />
      </svg>
      <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
        <span style={{ fontFamily:"'Space Mono'", fontSize:size>48?13:10, color, fontWeight:700 }}>{score}</span>
      </div>
    </div>
  );
};

// ── SCORE TRANSACTION MODAL ───────────────────────────────────────────────────
const ScoreModal = ({ onClose }) => {
  const [form, setForm] = useState({ amount:"", vendor:"", category:"", hour: new Date().getHours() });
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);

  const f = (k,v) => setForm(p => ({...p,[k]:v}));

  const run = () => {
    if (!form.amount || !form.vendor || !form.category) return;
    setLoading(true);
    setResult(null);
    setTimeout(() => {
      const r = scoreTransaction({ amount:+form.amount, vendor:form.vendor, category:form.category, hour:+form.hour });
      setResult(r);
      setLoading(false);
    }, 900);
  };

  const inputS = {
    width:"100%", background:C.surfaceAlt, border:`1px solid ${C.border}`,
    borderRadius:6, padding:"9px 12px", color:C.text, fontSize:13,
  };
  const labelS = { fontSize:11, color:C.textMuted, marginBottom:5, display:"block", fontWeight:500 };
  const scoreColor = result ? (result.score >= 85 ? C.red : result.score >= 60 ? C.amber : C.green) : C.teal;

  return (
    <div className="modal-backdrop" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal-box" style={{
        background:C.surface, border:`1px solid ${C.border}`, borderRadius:12,
        padding:28, width:460, maxWidth:"95vw",
      }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
          <div>
            <div style={{ fontFamily:"'Space Mono'", fontSize:13, color:C.teal, fontWeight:700 }}>🧠 SCORE A TRANSACTION</div>
            <div style={{ color:C.textMuted, fontSize:12, marginTop:3 }}>Live ML risk scoring engine</div>
          </div>
          <button onClick={onClose} style={{ color:C.textMuted, fontSize:18, padding:"4px 8px" }}>✕</button>
        </div>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:12 }}>
          <div>
            <label style={labelS}>Transaction Amount ($)</label>
            <input style={inputS} type="number" placeholder="e.g. 3500"
              value={form.amount} onChange={e => f("amount", e.target.value)} />
          </div>
          <div>
            <label style={labelS}>Hour of Day (0–23)</label>
            <input style={inputS} type="number" min="0" max="23" placeholder="e.g. 2"
              value={form.hour} onChange={e => f("hour", e.target.value)} />
          </div>
          <div>
            <label style={labelS}>Payment Vendor</label>
            <select style={inputS} value={form.vendor} onChange={e => f("vendor", e.target.value)}>
              <option value="">Select vendor…</option>
              {VENDORS.map(v => <option key={v} value={v}>{v}</option>)}
            </select>
          </div>
          <div>
            <label style={labelS}>Transaction Category</label>
            <select style={inputS} value={form.category} onChange={e => f("category", e.target.value)}>
              <option value="">Select category…</option>
              {CATS.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
          </div>
        </div>

        <button onClick={run} style={{
          width:"100%", padding:"11px", borderRadius:8, fontSize:13, fontWeight:600,
          background:C.teal, color:C.bg, marginBottom:20,
          boxShadow:`0 0 16px ${C.teal}44`,
          opacity: (!form.amount||!form.vendor||!form.category) ? 0.5 : 1,
        }}>
          {loading ? "Scoring…" : "Run Detection Engine →"}
        </button>

        {loading && (
          <div style={{ textAlign:"center", padding:"20px 0" }}>
            <div style={{ color:C.teal, fontFamily:"'Space Mono'", fontSize:12, marginBottom:8 }}>QUERYING SAGEMAKER ML ENDPOINT…</div>
            <div style={{ height:3, background:C.border, borderRadius:2, overflow:"hidden" }}>
              <div style={{ height:"100%", width:"60%", background:C.teal, borderRadius:2, animation:"scan 1.2s ease infinite" }} />
            </div>
          </div>
        )}

        {result && (
          <div style={{ border:`1px solid ${scoreColor}33`, borderRadius:8, padding:16, background:`${scoreColor}08`, animation:"slide-in .3s ease" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
              <div>
                <div style={{ fontFamily:"'Space Mono'", fontSize:11, color:C.textMuted }}>ML RISK SCORE</div>
                <div style={{ fontFamily:"'Space Mono'", fontSize:36, fontWeight:700, color:scoreColor }}>{result.score}</div>
              </div>
              <Badge status={result.status} />
            </div>

            {result.signals.length > 0 && (
              <div>
                <div style={{ fontSize:11, color:C.textMuted, marginBottom:6, fontFamily:"'Space Mono'" }}>FRAUD SIGNALS DETECTED</div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>

                    <span key={s} style={{
                      background:C.amberGlow, color:C.amber, border:`1px solid ${C.amber}33`,

              {result.status === "clear"    && "✅ Transaction cleared. No significant fraud signals detected."}
            </div>

const PMOverview = ({ onSelectClient }) => {
  const totalAlerts = CLIENTS.reduce((s,c) => s+c.alerts, 0);
  const totalSaved  = CLIENTS.reduce((s,c) => s+c.saved,  0);
  const totalTxns   = CLIENTS.reduce((s,c) => s+c.transactions, 0);
  const avgScore    = Math.round(CLIENTS.reduce((s,c) => s+c.score, 0) / CLIENTS.length);

  // Live ticker feed
  const [ticker, setTicker] = useState(() => {
    return Array.from({ length:5 }, () => {
      const c = CLIENTS[Math.floor(Math.random()*CLIENTS.length)];
      return { ...genTxn(c.name), client: c.name, _key: Math.random() };
    });
  });

  useEffect(() => {
    const iv = setInterval(() => {
      const c = CLIENTS[Math.floor(Math.random()*CLIENTS.length)];
      const txn = { ...genTxn(c.name), client:c.name, _key:Math.random() };
      setTicker(prev => [txn, ...prev.slice(0,6)]);
    }, 3200);

};

// ── CLIENT VIEW ───────────────────────────────────────────────────────────────
const ClientView = ({ client }) => {
  const [txns, setTxns] = useState(() => Array.from({length:18}, () => genTxn(client?.name||"")));
  const [filter, setFilter] = useState("all");
  const [liveCount, setLiveCount] = useState(0);

  useEffect(() => {
    if (!client) return;
    const iv = setInterval(() => {
      const t = genTxn(client.name);
      setTxns(prev => [t, ...prev.slice(0,24)]);
      setLiveCount(n => n+1);
    }, 5000);
    return () => clearInterval(iv);
  }, [client?.id]);

  if (!client) return (
    <div style={{ padding:28, display:"flex", alignItems:"center", justifyContent:"center", height:"60vh" }}>
      <div style={{ textAlign:"center", color:C.textMuted }}>
        <div style={{ fontSize:40, marginBottom:16 }}>◉</div>
        <div style={{ fontFamily:"'Space Mono'", fontSize:14 }}>SELECT A CLIENT</div>
        <div style={{ fontSize:12, marginTop:6 }}>Choose from PM Overview to view their dashboard</div>
      </div>
    </div>
  );

  return (

          <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:4 }}>

              <span style={{ fontSize:11, color:C.green, fontFamily:"'Space Mono'" }}>+{liveCount} live</span>

          <div style={{ color:C.textMuted, fontSize:13 }}>{client.industry} · {client.location} · Onboarded {client.onboarded}</div>

        <StatCard label="Fraud Score"     value={client.score}   sub="Risk index" color={client.score>75?C.green:client.score>50?C.amber:C.red} icon="📊" />
        <StatCard label="Transactions"    value={client.transactions.toLocaleString()} sub="30-day volume" color={C.blue}                    icon="💳" />
        <StatCard label="Flagged"         value={client.flagged}  sub="For review" color={C.red}                                               icon="🚩" />

      <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, overflow:"hidden" }}>
        <div style={{ padding:"14px 18px", borderBottom:`1px solid ${C.border}`, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>
            <div style={{ fontWeight:600, fontSize:14 }}>Transaction Monitor</div>
            <div style={{ color:C.textMuted, fontSize:12, marginTop:1 }}>Real-time feed with ML risk scoring — new transactions every 5s</div>
          </div>
          <div style={{ display:"flex", gap:6 }}>
            {["all","flagged","review","clear"].map(f => (
              <button key={f} onClick={() => setFilter(f)} style={{

  );
};

const STEPS = [
  { label:"Business Info",  icon:"🏪" },
  { label:"Financials",     icon:"💳" },
  { label:"Risk Profile",   icon:"🎯" },
  { label:"Configuration",  icon:"⚙️" },
  { label:"Deploy",         icon:"🚀" },
];

const OnboardView = () => {
  const [step, setStep] = useState(0);
  const [deployed, setDeployed] = useState(false);
  const [deploying, setDeploying] = useState(false);
  const [deployLog, setDeployLog] = useState([]);
  const [form, setForm] = useState({
    bizName:"", industry:"", location:"", employees:"",
    annualRev:"", processorType:"", avgTxnSize:"",
    riskTolerance:"medium", alertEmail:"", enableSMS:true,
    mlSensitivity:"balanced", blockThreshold:85,
  });

  const f = (k,v) => setForm(p => ({...p,[k]:v}));

  const deploySteps = [
    "Provisioning AWS Lambda functions…",
    "Configuring SageMaker ML endpoint…",
    "Initializing DynamoDB transaction tables…",
    "Starting Kinesis event stream…",
    "Deploying SNS alert service…",
    "Configuring API Gateway routes…",
    "Running baseline fraud model training…",
    "Validating end-to-end detection pipeline…",
    "✓ FraudShield SMB deployed successfully!",
  ];

  const startDeploy = () => {
    setDeploying(true);
    deploySteps.forEach((msg,i) => {
      setTimeout(() => {
        setDeployLog(p => [...p, msg]);
        if (i===deploySteps.length-1) setTimeout(() => setDeployed(true), 600);
      }, i*700);
    });
  };

  const IS = {
    width:"100%", background:C.surfaceAlt, border:`1px solid ${C.border}`,

          <div key={i} onClick={() => i<=step && setStep(i)} style={{
            flex:1, padding:"12px 8px", textAlign:"center", cursor:i<=step?"pointer":"default",

            borderRight:i<STEPS.length-1?`1px solid ${C.border}`:"none",

            <div style={{ fontSize:11, color:i===step?C.teal:i<step?C.textMuted:C.textDim, fontWeight:i===step?600:400 }}>{s.label}</div>
            {i<step && <div style={{ fontSize:10, color:C.green, marginTop:2 }}>✓</div>}
          </div>
        ))}
      </div>

      <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:"22px 26px" }}>

        {step===0 && (
          <div style={{ animation:"slide-in .25s ease" }}>
            <div style={{ fontWeight:600, fontSize:15, marginBottom:18 }}>Business Information</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
              <div><label style={LS}>Business Name *</label><input style={IS} value={form.bizName} onChange={e=>f("bizName",e.target.value)} placeholder="e.g. Pinewood Bakery" /></div>
              <div>
                <label style={LS}>Industry *</label>
                <select style={SS} value={form.industry} onChange={e=>f("industry",e.target.value)}>
                  <option value="">Select industry…</option>
                  {["Food & Beverage","Retail","Healthcare","Legal Services","Automotive","Construction","Professional Services","Other"].map(i=>(
                    <option key={i} value={i}>{i}</option>
                  ))}

              </div>
              <div><label style={LS}>Location</label><input style={IS} value={form.location} onChange={e=>f("location",e.target.value)} placeholder="e.g. Seattle, WA" /></div>

            </div>

          <div style={{ animation:"slide-in .25s ease" }}>
            <div style={{ fontWeight:600, fontSize:15, marginBottom:18 }}>Deploy to AWS</div>
            {!deploying && !deployed && (
              <div style={{ textAlign:"center", padding:"20px 0" }}>
                <div style={{ fontSize:48, marginBottom:16 }}>🚀</div>
                <div style={{ fontWeight:600, fontSize:15, marginBottom:8 }}>Ready to Deploy</div>
                <div style={{ color:C.textMuted, fontSize:13, marginBottom:24 }}>
                  This will provision your AWS infrastructure and activate fraud detection for <strong style={{ color:C.text }}>{form.bizName||"your client"}</strong>.
                </div>
                <button onClick={startDeploy} style={{
                  padding:"12px 32px", borderRadius:10, fontSize:14, fontWeight:700,
                  background:C.teal, color:C.bg, boxShadow:`0 0 24px ${C.teal}55`,
                }}>
                  Deploy FraudShield SMB →
                </button>
              </div>
            )}
            {deploying && !deployed && (
              <div style={{ fontFamily:"'Space Mono'", fontSize:12, background:C.surfaceAlt, borderRadius:8, padding:"16px 18px" }}>
                {deployLog.map((msg,i) => (
                  <div key={i} style={{ color:msg.startsWith("✓")?C.green:C.teal, marginBottom:8, animation:"ticker-in .3s ease" }}>{msg}</div>
                ))}
                {deployLog.length < deploySteps.length && (
                  <div style={{ color:C.textDim }}>…</div>
                )}
              </div>
            )}
            {deployed && (
              <div style={{ textAlign:"center", padding:"16px 0", animation:"slide-in .4s ease" }}>
                <div style={{ fontSize:48, marginBottom:12 }}>✅</div>
                <div style={{ fontFamily:"'Space Mono'", fontSize:16, color:C.green, fontWeight:700, marginBottom:8 }}>DEPLOYED SUCCESSFULLY</div>
                <div style={{ color:C.textMuted, fontSize:13, marginBottom:20 }}>
                  {form.bizName||"Client"} is now protected by FraudShield SMB AI fraud detection.
                </div>
                <div style={{ background:C.surfaceAlt, borderRadius:8, padding:"14px 18px", textAlign:"left", border:`1px solid ${C.border}` }}>
                  {[
                    ["Endpoint",   "api.fraudshield.io/v1/score"],
                    ["Client ID",  `SMB-${Math.random().toString(36).substr(2,8).toUpperCase()}`],
                    ["Block Threshold", `≥ ${form.blockThreshold}`],
                    ["Alert Email",     form.alertEmail||"configured"],
                    ["Status",     "🟢 ACTIVE"],
                  ].map(([k,v]) => (
                    <div key={k} style={{ display:"flex", justifyContent:"space-between", marginBottom:6, fontSize:12 }}>
                      <span style={{ color:C.textMuted }}>{k}</span>
                      <span style={{ fontFamily:"'Space Mono'", color:C.teal, fontSize:11 }}>{v}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        {!deployed && (
          <div style={{ display:"flex", justifyContent:"space-between", marginTop:22, paddingTop:18, borderTop:`1px solid ${C.border}` }}>
            <button onClick={() => setStep(s=>Math.max(0,s-1))} disabled={step===0} style={{
              padding:"9px 20px", borderRadius:8, fontSize:13, fontWeight:500,
              background:step===0?"transparent":C.surfaceAlt,
              color:step===0?C.textDim:C.text,
              border:`1px solid ${step===0?C.textDim+"44":C.border}`,
              cursor:step===0?"not-allowed":"pointer",
            }}>← Previous</button>
            {step<4 && (
              <button onClick={() => setStep(s=>Math.min(4,s+1))} style={{
                padding:"9px 24px", borderRadius:8, fontSize:13, fontWeight:600,
                background:C.teal, color:C.bg, boxShadow:`0 0 16px ${C.teal}44`,
              }}>
                {step===3?"Review & Deploy →":"Next →"}
              </button>
            )}
          </div>
        )}
      </div>
    </div>
  );
};

// ── ARCHITECTURE VIEW ─────────────────────────────────────────────────────────
const ArchView = () => {
  const [hovered, setHovered] = useState(null);
  const nodeMap = {};
  ARCH_NODES.forEach(n => { nodeMap[n.id]=n; });

  return (
    <div style={{ padding:28, animation:"slide-in .35s ease" }}>
      <div style={{ marginBottom:22 }}>
        <h1 style={{ fontSize:22, fontWeight:600, letterSpacing:"-0.02em", marginBottom:4 }}>System Architecture</h1>
        <p style={{ color:C.textMuted, fontSize:13 }}>Cloud-native fraud detection pipeline — AWS infrastructure</p>
      </div>

      <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:12, padding:24, marginBottom:22, position:"relative", overflow:"hidden" }}>
        <div style={{
          position:"absolute", inset:0, opacity:.04,
          backgroundImage:`linear-gradient(${C.teal} 1px, transparent 1px), linear-gradient(90deg, ${C.teal} 1px, transparent 1px)`,
          backgroundSize:"32px 32px",
        }} />
        <svg style={{ width:"100%", height:300, position:"relative", zIndex:1 }} viewBox="0 0 100 80" preserveAspectRatio="xMidYMid meet">
          {ARCH_EDGES.map(([fid,tid],i) => {
            const fn=nodeMap[fid], tn=nodeMap[tid];
            if(!fn||!tn) return null;
            return <line key={i} x1={fn.x+9} y1={fn.y+5} x2={tn.x+9} y2={tn.y+5}
              stroke={C.border} strokeWidth={0.5} strokeDasharray="2,1" opacity={0.8} />;
          })}
          {ARCH_NODES.map(n => (
            <g key={n.id} onMouseEnter={()=>setHovered(n.id)} onMouseLeave={()=>setHovered(null)} style={{ cursor:"pointer" }}>
              <rect x={n.x} y={n.y-1} width={18} height={11} rx={2}
                fill={hovered===n.id?n.color+"33":C.surfaceAlt}
                stroke={hovered===n.id?n.color:C.border}
                strokeWidth={hovered===n.id?.8:.4} />
              <text x={n.x+9} y={n.y+4.5} textAnchor="middle" fontSize={3.5} fill={n.color} fontFamily="monospace">{n.icon}</text>
              <text x={n.x+9} y={n.y+8}   textAnchor="middle" fontSize={2.2} fill={C.text}      fontFamily="sans-serif" fontWeight="600">{n.label}</text>
              <text x={n.x+9} y={n.y+10.5} textAnchor="middle" fontSize={1.8} fill={C.textMuted} fontFamily="sans-serif">{n.sub}</text>
            </g>
          ))}
        </svg>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12, marginBottom:20 }}>
        {[
          { icon:"⚡", name:"AWS API Gateway",  desc:"Request routing, rate limiting, auth",             color:C.blue     },
          { icon:"🧠", name:"AWS SageMaker",    desc:"ML fraud detection model inference (<120ms)",       color:C.amber    },
          { icon:"⚙️", name:"AWS Lambda",       desc:"Serverless rules engine and alert triggers",        color:C.textMuted},
          { icon:"📡", name:"AWS Kinesis",      desc:"Real-time event streaming pipeline",                color:C.textMuted},
          { icon:"🗄️", name:"AWS DynamoDB",     desc:"Transaction storage, history, and audit log",       color:C.green    },
          { icon:"🚨", name:"AWS SNS",          desc:"Alert delivery — email, SMS, webhook",               color:C.red      },
          { icon:"🔐", name:"AWS Cognito",      desc:"Authentication, authorization, MFA",                color:C.textMuted},
          { icon:"📊", name:"PM Dashboard",     desc:"Multi-client portfolio management interface",        color:C.teal     },
          { icon:"📱", name:"SMB Dashboard",    desc:"Client-facing monitoring and alert review",          color:C.green    },
        ].map(s => (
          <div key={s.name} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:"14px 16px", borderLeft:`3px solid ${s.color}` }}>
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
              <span style={{ fontSize:15 }}>{s.icon}</span>
              <span style={{ fontWeight:600, fontSize:12 }}>{s.name}</span>
            </div>
            <div style={{ fontSize:11, color:C.textMuted }}>{s.desc}</div>
          </div>
        ))}
      </div>

      <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:"18px 20px" }}>
        <div style={{ fontWeight:600, fontSize:14, marginBottom:12 }}>Transaction Flow</div>
        <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap", marginBottom:12 }}>
          {["SMB Client","→","API Gateway","→","SageMaker ML","→","Rules Engine","→","DynamoDB","→","SNS Alert","→","PM + SMB Dashboard"].map((s,i) => (
            <span key={i} style={{
              color:s==="→"?C.textDim:C.teal,
              fontFamily:s==="→"?"inherit":"'Space Mono'",
              fontSize:s==="→"?16:11, fontWeight:s==="→"?300:600,
              background:s==="→"?"transparent":C.tealGlow,
              padding:s==="→"?"0":"3px 8px", borderRadius:4,
              border:s==="→"?"none":`1px solid ${C.teal}33`,
            }}>{s}</span>
          ))}
        </div>
        <div style={{ color:C.textMuted, fontSize:12 }}>
          Detection latency: <span style={{ color:C.teal, fontFamily:"'Space Mono'" }}>&lt;120ms avg (94ms validated)</span>
          {" "}· Detection rate: <span style={{ color:C.green, fontFamily:"'Space Mono'" }}>87.5%</span>
          {" "}· False positive rate: <span style={{ color:C.amber, fontFamily:"'Space Mono'" }}>6.5%</span>
          {" "}· Alert delivery: <span style={{ color:C.teal, fontFamily:"'Space Mono'" }}>&lt;60s (38s avg)</span>
        </div>
      </div>
    </div>
  );
};

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState("pm");
  const [selectedClient, setSelectedClient] = useState(null);
  const [showScore, setShowScore] = useState(false);

  const handleSelectClient = (client) => {
    setSelectedClient(client);
    setView("client");
  };

  return (
    <>
      <div style={{ display:"flex", minHeight:"100vh", background:C.bg }}>
        <Nav active={view} setActive={setView} clientName={selectedClient?.name} onScore={() => setShowScore(true)} />
        <main style={{ flex:1, overflowY:"auto", minHeight:"100vh" }}>
          {view==="pm"      && <PMOverview onSelectClient={handleSelectClient} />}
          {view==="client"  && <ClientView client={selectedClient} />}
          {view==="onboard" && <OnboardView />}
          {view==="arch"    && <ArchView />}
        </main>
      </div>
      {showScore && <ScoreModal onClose={() => setShowScore(false)} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
